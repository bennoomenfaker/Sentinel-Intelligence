version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: collector-postgres
    environment:
      POSTGRES_USER: collector
      POSTGRES_PASSWORD: collector123
      POSTGRES_DB: collector_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collector"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: collector-app
    environment:
      DATABASE_URL: postgresql://collector:collector123@postgres:5432/collector_engine
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/home/himawari/2027/src
    command: sh -c "npx prisma migrate deploy && npm run start:prod"

volumes:
  postgres_data: